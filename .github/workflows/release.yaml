name: Release

on:
  push:

permissions:
  contents: write # Needed to upload artifacts to the release
  id-token: write # Needed for OIDC PyPI publishing
  packages: write
  attestations: write
jobs:
  build:
    name: Build Wheel and SDist
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.baipp.outputs.package_name }}
      version: ${{ steps.baipp.outputs.package_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: hynek/build-and-inspect-python-package@f3d069d0f9a3c9169d1a483318bb0e09876a6fd6 # v2.15.0
        id: baipp

  # publish:
  #   name: Publish to PyPI
  #   runs-on: ubuntu-latest
  #   needs: [build]
  #   ## TODO: optionally provide the name of the environment for the trusted
  #   ## publisher on PyPI
  #   ## https://docs.github.com/en/actions/deployment/targeting-different-environments/using-environments-for-deployment
  #   # environment:
  #   #   name: pypi
  #   #   url: https://pypi.org/project/${{ needs.build.outputs.name }}/${{ needs.build.outputs.version }}
  #   if: startsWith(github.ref, 'refs/tags/')
  #   steps:
  #     - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
  #       with:
  #         name: Packages
  #         path: dist
  #     - name: Publish
  #       ## TODO: create a trusted publisher on PyPI
  #       ## https://docs.pypi.org/trusted-publishers/
  #       uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag(s)
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            echo "tag=dev" >> $GITHUB_OUTPUT
            echo "extra_tag=" >> $GITHUB_OUTPUT
          else
            TAG_NAME=${GITHUB_REF#refs/tags/}
            echo "tag=${TAG_NAME}" >> $GITHUB_OUTPUT
            echo "extra_tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          docker build -t $IMAGE:${{ steps.vars.outputs.tag }} .
          if [ -n "${{ steps.vars.outputs.extra_tag }}" ]; then
            docker tag $IMAGE:${{ steps.vars.outputs.tag }} $IMAGE:${{ steps.vars.outputs.extra_tag }}
          fi

      - name: Push Docker image(s)
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          docker push $IMAGE:${{ steps.vars.outputs.tag }}
          if [ -n "${{ steps.vars.outputs.extra_tag }}" ]; then
            docker push $IMAGE:${{ steps.vars.outputs.extra_tag }}
          fi
